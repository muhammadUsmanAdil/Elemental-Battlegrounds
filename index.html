<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sovereign Universe: Toxic Impact</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Arial Black', sans-serif; touch-action: none; }
        canvas { display: block; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        #stats { position: absolute; top: 20px; left: 20px; }
        #coin-lbl { color: #ffd700; font-size: 24px; text-shadow: 2px 2px #000; }
        #hp-bg { width: 200px; height: 15px; background: #333; border: 2px solid #fff; border-radius: 10px; overflow: hidden; }
        #hp-fill { width: 100%; height: 100%; background: #ff3333; transition: width 0.2s; }
        #boss-hud { position: absolute; top: 30px; left: 50%; transform: translateX(-50%); width: 60%; display: none; text-align: center; }
        #boss-name { color: white; font-size: 20px; text-transform: uppercase; margin-bottom: 5px; text-shadow: 2px 2px #000; }
        #boss-hp-bg { width: 100%; height: 20px; background: #222; border: 2px solid #fff; }
        #boss-hp-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #ff0000, #660000); }
        #sidebar { position: absolute; left: 20px; top: 120px; pointer-events: auto; }
        .nav-btn { display: block; padding: 12px; margin-bottom: 10px; background: #2ecc71; color: white; border: 3px solid #fff; border-radius: 8px; width: 160px; font-weight: bold; cursor: pointer; }
        #btn-grp { position: absolute; right: 20px; bottom: 20px; pointer-events: auto; }
        .act-btn { width: 90px; height: 90px; border-radius: 50%; border: 4px solid #fff; color: white; font-weight: bold; margin: 10px; cursor: pointer; }
        #punch-btn { background: #e74c3c; box-shadow: 0 5px #900; }
        #skill-btn { background: #3498db; box-shadow: 0 5px #222; }
        #shop-menu { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 280px; background: rgba(0,0,0,0.95); border: 4px solid #f1c40f; padding: 20px; text-align: center; color: white; display: none; pointer-events: auto; }
        #spin-btn { background: #f1c40f; color: #000; padding: 15px; width: 100%; border: none; font-weight: 900; border-radius: 10px; cursor: pointer; }
        #joy-base { position: absolute; left: 40px; bottom: 40px; width: 120px; height: 120px; background: rgba(255,255,255,0.1); border: 2px solid #fff; border-radius: 50%; pointer-events: auto; }
        #joy-stick { position: absolute; left: 35px; top: 35px; width: 50px; height: 50px; background: #fff; border-radius: 50%; }
        #msg-box { position: absolute; top: 20%; width: 100%; text-align: center; font-size: 40px; color: gold; display: none; text-shadow: 3px 3px #000; }
    </style>
</head>
<body>

<div id="msg-box">JACKPOT!</div>
<div id="ui">
    <div id="stats">
        <div id="coin-lbl">C: 0</div>
        <div id="hp-bg"><div id="hp-fill"></div></div>
        <div id="style-txt" style="color:#fff; margin-top:5px;">STYLE: Earth</div>
    </div>
    <div id="boss-hud">
        <div id="boss-name">BOSS</div>
        <div id="boss-hp-bg"><div id="boss-hp-fill"></div></div>
    </div>
    <div id="sidebar">
        <button id="dungeon-btn" class="nav-btn">GO DUNGEON</button>
        <button id="exit-btn" class="nav-btn" style="display:none; background:#e67e22;">EXIT MAP</button>
    </div>
    <div id="joy-base"><div id="joy-stick"></div></div>
    <div id="btn-grp">
        <button id="skill-btn" class="act-btn">SKILL</button><br>
        <button id="punch-btn" class="act-btn">PUNCH</button>
    </div>
    <div id="shop-menu">
        <h2 style="color:#f1c40f;">MYSTIC SHOP</h2>
        <button id="spin-btn">SPIN (20 C)</button>
        <button onclick="document.getElementById('shop-menu').style.display='none'" style="background:none; border:none; color:gray; margin-top:10px;">CLOSE</button>
    </div>
</div>
<canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById("canvas"), ctx = canvas.getContext("2d");
    const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
    window.onresize = resize; resize();

    function sound(f, t, d, v) {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
            g.gain.setValueAtTime(v, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d);
            o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + d);
        } catch(e){}
    }

    let coins = 100, style = "Earth", scene = "battle", wave = 0, shake = 0;
    let p = { x: 300, y: 300, hp: 100, vx: 0, vy: 0, anim: 0 };
    let enemies = [], fx = [], skillCd = 0, mudWall = null, activeUlt = null;

    const styles = {
        "Earth": { col: "#8b5a2b", cd: 8000 },
        "Ice": { col: "#00f2ff", cd: 5000 },
        "Flame": { col: "#ff5500", cd: 5000 },
        "Void": { col: "#aa00ff", cd: 10000 },
        "Gambler": { col: "#2ecc71", cd: 12000 }
    };

    function spawn(type) {
        let x = Math.random() < 0.5 ? -100 : canvas.width + 100;
        let y = Math.random() * canvas.height;
        if(type === "normal") enemies.push({ x, y, hp: 200, max: 200, s: 1, spd: 3, type: "normal" });
        if(type === "boss") enemies.push({ x, y, hp: 6000, max: 6000, s: 2.5, spd: 2.2, type: "boss", dashCd: 0 });
        if(type === "zombie") enemies.push({ x, y, hp: 10000, max: 10000, s: 4, spd: 1.5, type: "zombie", jump: 0, vy: 0 });
    }
    for(let i=0; i<3; i++) spawn("normal");

    function drawBody(x, y, s, col, isZombie, anim) {
        const walk = Math.sin(anim * 0.2) * 15 * s;
        ctx.strokeStyle = col; ctx.lineWidth = 5 * s; ctx.lineCap = "round";
        ctx.beginPath(); ctx.arc(x, y - 60*s, 15*s, 0, 7); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(x, y - 45*s); ctx.lineTo(x, y); ctx.stroke();
        if(isZombie) {
            ctx.beginPath(); ctx.moveTo(x, y - 35*s); ctx.lineTo(x + 35*s, y - 55*s); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(x, y - 35*s); ctx.lineTo(x - 35*s, y - 55*s); ctx.stroke();
        } else {
            ctx.beginPath(); ctx.moveTo(x, y - 35*s); ctx.lineTo(x - 20*s + walk, y - 10*s); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(x, y - 35*s); ctx.lineTo(x + 20*s - walk, y - 10*s); ctx.stroke();
        }
        ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x - 15*s - walk, y + 40*s); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x + 15*s + walk, y + 40*s); ctx.stroke();
    }

    let joyId = null;
    window.addEventListener("touchstart", e => { if(e.touches[0].clientX < 250) joyId = e.touches[0].identifier; });
    window.addEventListener("touchmove", e => {
        for(let t of e.changedTouches) if(t.identifier === joyId) {
            let dx = t.clientX - 100, dy = t.clientY - (window.innerHeight - 100);
            let dist = Math.min(Math.hypot(dx, dy), 50);
            let ang = Math.atan2(dy, dx);
            p.vx = Math.cos(ang) * (dist/50) * 8; p.vy = Math.sin(ang) * (dist/50) * 8;
            document.getElementById("joy-stick").style.transform = `translate(${Math.cos(ang)*dist}px, ${Math.sin(ang)*dist}px)`;
        }
    });
    window.addEventListener("touchend", () => { joyId = null; p.vx = 0; p.vy = 0; document.getElementById("joy-stick").style.transform="none"; });

    document.getElementById("punch-btn").onclick = () => {
        sound(150, 'sine', 0.1, 0.4);
        fx.push({x: p.x, y: p.y, r: 10, max: 80, c: "white", type:"normal"});
        enemies.forEach(en => { if(Math.hypot(p.x-en.x, p.y-en.y) < 130) en.hp -= 100; });
    };

    document.getElementById("skill-btn").onclick = () => {
        if(Date.now() < skillCd) return;
        skillCd = Date.now() + styles[style].cd;
        if(style === "Earth") {
            mudWall = { x: p.x + 50, y: p.y - 80, w: 30, h: 160, life: Date.now() + 5000 };
            sound(100, 'square', 0.5, 0.4);
        } else if(style === "Flame") {
            enemies.forEach(en => { if(Math.hypot(p.x-en.x, p.y-en.y) < 400) en.hp -= 4000; });
            fx.push({x: p.x, y: p.y, r: 0, max: 400, c: "#ff5500", type: "nova"});
            sound(60, 'sawtooth', 0.5, 0.5);
        } else {
            activeUlt = { type: style, x: p.x, y: -200, targetY: p.y, r: 80 };
        }
    };

    document.getElementById("dungeon-btn").onclick = () => { scene = "dungeon"; enemies = []; document.getElementById("dungeon-btn").style.display="none"; document.getElementById("exit-btn").style.display="block"; };
    document.getElementById("exit-btn").onclick = () => { scene = "battle"; wave = 0; spawn("normal"); document.getElementById("exit-btn").style.display="none"; document.getElementById("dungeon-btn").style.display="block"; document.getElementById("shop-menu").style.display="none"; };
    document.getElementById("spin-btn").onclick = () => { if(coins >= 20) { coins -= 20; let s = ["Ice","Flame","Void","Gambler","Earth"]; style = s[Math.floor(Math.random()*s.length)]; } };

    function loop() {
        ctx.save();
        if(shake > 0) { ctx.translate(Math.random()*shake - shake/2, Math.random()*shake - shake/2); shake *= 0.9; }
        
        ctx.fillStyle = scene === "battle" ? "#0a0a0a" : "#0d1b0d";
        ctx.fillRect(-100,-100,canvas.width+200, canvas.height+200);
        
        document.getElementById("coin-lbl").innerText = "C: " + coins;
        document.getElementById("hp-fill").style.width = p.hp + "%";
        document.getElementById("style-txt").innerText = "STYLE: " + style;
        document.getElementById("style-txt").style.color = styles[style].col;

        let rem = Math.max(0, (skillCd - Date.now())/1000);
        document.getElementById("skill-btn").innerText = rem > 0 ? rem.toFixed(1) : "SKILL";

        if(p.vx !== 0 || p.vy !== 0) p.anim++;
        p.x += p.vx; p.y += p.vy;
        drawBody(p.x, p.y, 1, styles[style].col, false, p.anim);

        if(mudWall) {
            ctx.fillStyle = "#5d4037"; ctx.fillRect(mudWall.x, mudWall.y, mudWall.w, mudWall.h);
            if(Date.now() > mudWall.life) mudWall = null;
        }

        let boss = enemies.find(e => e.type !== "normal");
        if(boss) {
            document.getElementById("boss-hud").style.display = "block";
            document.getElementById("boss-name").innerText = boss.type === "zombie" ? "Zombie Sovereign" : "Red Sovereign";
            document.getElementById("boss-hp-fill").style.width = (boss.hp / boss.max * 100) + "%";
        } else { document.getElementById("boss-hud").style.display = "none"; }

        if(scene === "battle") {
            enemies.forEach((en, i) => {
                let d = Math.hypot(p.x-en.x, p.y-en.y);
                let blocked = mudWall && en.x > mudWall.x - 20 && en.x < mudWall.x + 50 && en.y > mudWall.y && en.y < mudWall.y + 160;
                
                if(!blocked) {
                    if(en.type === "boss") {
                        let a = Math.atan2(p.y-en.y, p.x-en.x);
                        if(Date.now() > en.dashCd && d < 300) { en.x += Math.cos(a)*100; en.y += Math.sin(a)*100; en.dashCd = Date.now() + 2000; }
                        else { en.x += Math.cos(a)*en.spd; en.y += Math.sin(a)*en.spd; }
                    } else if(en.type === "zombie") {
                        if(en.jump === 1) {
                            en.y += en.vy; en.vy += 1.2;
                            if(en.y >= p.y) { 
                                en.jump = 0; 
                                shake = 20; // SCREEN SHAKE
                                fx.push({x: en.x, y: en.y, r: 0, max: 350, c: "#2ecc71", type: "toxic_shock"}); // BOSS PUNCH EFFECT
                                sound(40, 'square', 0.5, 0.6);
                                if(d < 350) p.hp -= 25; 
                            }
                        } else {
                            let a = Math.atan2(p.y-en.y, p.x-en.x);
                            en.x += Math.cos(a)*en.spd; en.y += Math.sin(a)*en.spd;
                            if(Math.random() < 0.01) { en.jump = 1; en.vy = -25; }
                        }
                    } else {
                        let a = Math.atan2(p.y-en.y, p.x-en.x);
                        en.x += Math.cos(a)*en.spd; en.y += Math.sin(a)*en.spd;
                    }
                }

                drawBody(en.x, en.y, en.s, en.type==="zombie"?"#2ecc71":(en.type==="boss"?"#ff0000":"#fff"), en.type==="zombie", p.anim);
                if(d < 60 && Date.now()%500 < 50) p.hp -= 5;
                if(en.hp <= 0) {
                    coins += en.type === "normal" ? 30 : 200;
                    enemies.splice(i,1);
                    if(enemies.length === 0) { wave++; if(wave===1) spawn("boss"); else if(wave===2) spawn("zombie"); else { spawn("normal"); wave=0; }}
                }
            });
        } else {
            ctx.strokeStyle = "#f1c40f"; ctx.lineWidth = 10;
            ctx.beginPath(); ctx.arc(canvas.width/2, canvas.height/2, 80 + Math.sin(Date.now()*0.01)*10, 0, 7); ctx.stroke();
            if(Math.hypot(p.x - canvas.width/2, p.y - canvas.height/2) < 90) document.getElementById("shop-menu").style.display = "block";
        }

        if(activeUlt) {
            activeUlt.y += 20;
            ctx.fillStyle = styles[activeUlt.type].col;
            ctx.beginPath(); ctx.arc(activeUlt.x, activeUlt.y, 40, 0, 7); ctx.fill();
            if(activeUlt.y >= activeUlt.targetY) {
                enemies.forEach(en => { if(Math.hypot(activeUlt.x-en.x, activeUlt.y-en.y) < 400) en.hp -= 5000; });
                fx.push({x: activeUlt.x, y: activeUlt.y, r: 0, max: 400, c: styles[activeUlt.type].col, type: "nova"});
                activeUlt = null;
            }
        }

        fx.forEach((f, i) => {
            if(f.type === "toxic_shock") {
                ctx.strokeStyle = f.c; ctx.lineWidth = 15; ctx.globalAlpha = 1 - (f.r/f.max);
                ctx.beginPath(); ctx.arc(f.x, f.y, f.r, 0, 7); ctx.stroke();
                ctx.globalAlpha = 1; f.r += 12;
            } else {
                ctx.strokeStyle = f.c; ctx.lineWidth = 5; ctx.beginPath(); ctx.arc(f.x, f.y, f.r, 0, 7); ctx.stroke();
                f.r += 10;
            }
            if(f.r > f.max) fx.splice(i,1);
        });

        ctx.restore();
        if(p.hp <= 0) location.reload();
        requestAnimationFrame(loop);
    }
    loop();
</script>
</body>
</html>
