<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sovereign Universe: Precise Rates</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Arial Black', sans-serif; touch-action: none; }
        canvas { display: block; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        #stats { position: absolute; top: 20px; left: 20px; }
        #coin-lbl { color: #ffd700; font-size: 24px; text-shadow: 2px 2px #000; }
        #hp-bg { width: 200px; height: 15px; background: #333; border: 2px solid #fff; border-radius: 10px; overflow: hidden; }
        #hp-fill { width: 100%; height: 100%; background: #ff3333; transition: width 0.2s; }
        #style-txt { color:#fff; margin-top:5px; font-size: 14px; text-transform: uppercase; font-weight: 900; }
        
        #boss-hud { position: absolute; top: 30px; left: 50%; transform: translateX(-50%); width: 60%; display: none; text-align: center; }
        #boss-name { color: white; font-size: 18px; margin-bottom: 5px; text-shadow: 2px 2px #000; }
        #boss-hp-bg { width: 100%; height: 15px; background: #222; border: 2px solid #fff; }
        #boss-hp-fill { width: 100%; height: 100%; background: #f00; }

        #btn-grp { position: absolute; right: 20px; bottom: 20px; pointer-events: auto; }
        .act-btn { width: 90px; height: 90px; border-radius: 50%; border: 4px solid #fff; color: white; font-weight: bold; margin: 10px; cursor: pointer; }
        #punch-btn { background: #e74c3c; box-shadow: 0 5px #900; }
        #skill-btn { background: #3498db; box-shadow: 0 5px #222; }

        #sidebar { position: absolute; left: 20px; top: 120px; pointer-events: auto; }
        .nav-btn { display: block; padding: 12px; margin-bottom: 10px; background: #2ecc71; color: white; border: 2px solid #fff; border-radius: 8px; width: 160px; font-weight: bold; cursor: pointer; }

        #shop-menu { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 280px; background: rgba(0,0,0,0.95); border: 4px solid #f1c40f; padding: 20px; text-align: center; color: white; display: none; pointer-events: auto; border-radius: 15px; }
        #spin-btn { background: #f1c40f; color: #000; padding: 15px; width: 100%; border: none; font-weight: 900; border-radius: 10px; cursor: pointer; }
        
        #joy-base { position: absolute; left: 40px; bottom: 40px; width: 120px; height: 120px; background: rgba(255,255,255,0.1); border: 2px solid #fff; border-radius: 50%; pointer-events: auto; }
        #joy-stick { position: absolute; left: 35px; top: 35px; width: 50px; height: 50px; background: #fff; border-radius: 50%; }
        #msg-box { position: absolute; top: 20%; width: 100%; text-align: center; font-size: 40px; font-weight:900; display: none; text-shadow: 4px 4px #000; z-index: 100; }
        #cutscene-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: white; opacity:0; pointer-events:none; transition: opacity 0.3s; z-index: 50; mix-blend-mode: difference; }
    </style>
</head>
<body>

<div id="cutscene-overlay"></div>
<div id="msg-box"></div>
<div id="ui">
    <div id="stats">
        <div id="coin-lbl">C: 100</div>
        <div id="hp-bg"><div id="hp-fill"></div></div>
        <div id="style-txt">Earth</div>
    </div>
    <div id="boss-hud">
        <div id="boss-name">BOSS</div>
        <div id="boss-hp-bg"><div id="boss-hp-fill"></div></div>
    </div>
    <div id="sidebar">
        <button id="dungeon-btn" class="nav-btn">GO DUNGEON</button>
        <button id="exit-btn" class="nav-btn" style="display:none; background:#e67e22;">EXIT MAP</button>
    </div>
    <div id="joy-base"><div id="joy-stick"></div></div>
    <div id="btn-grp">
        <button id="skill-btn" class="act-btn">SKILL</button><br>
        <button id="punch-btn" class="act-btn">PUNCH</button>
    </div>
    <div id="shop-menu">
        <h2 style="color:#f1c40f;">MYSTIC SHOP</h2>
        <div style="font-size: 11px; color: #ccc; text-align: left; margin-bottom: 10px;">
            Earth: 50% | Ice: 40% | Flame: 30% | Void: 10% | Gambler: 5% | Sci: 4%
        </div>
        <button id="spin-btn">SPIN (20 C)</button>
        <button onclick="document.getElementById('shop-menu').style.display='none'" style="background:none; border:none; color:gray; margin-top:10px;">CLOSE</button>
    </div>
</div>
<canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById("canvas"), ctx = canvas.getContext("2d");
    const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
    window.onresize = resize; resize();

    function sound(f, t, d, v) {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
            g.gain.setValueAtTime(v, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d);
            o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + d);
        } catch(e){}
    }

    let coins = 100, style = "Earth", scene = "battle", wave = 0, shake = 0, isCutscene = false;
    let p = { x: 300, y: 300, hp: 100, vx: 0, vy: 0, anim: 0, isCasting: false, facing: 1 };
    let enemies = [], fx = [], skillCd = 0, curses = [], mudWall = null;

    const styles = {
        "Earth": { col: "#8b5a2b", cd: 6000 },
        "Ice": { col: "#00f2ff", cd: 5000 },
        "Flame": { col: "#ff5500", cd: 5000 },
        "Void": { col: "#aa00ff", cd: 12000 },
        "Gambler": { col: "#2ecc71", cd: 8000 },
        "Scientist": { col: "#00ff88", cd: 15000 }
    };

    function triggerMsg(txt, col) {
        const m = document.getElementById("msg-box");
        m.innerText = txt; m.style.color = col; m.style.display = "block";
        setTimeout(() => m.style.display = "none", 1500);
    }

    function spawn(type) {
        let x = Math.random() < 0.5 ? -100 : canvas.width + 100;
        let y = Math.random() * canvas.height;
        if(type === "normal") enemies.push({ x, y, hp: 400, max: 400, s: 1, spd: 3, type: "normal" });
        if(type === "boss") enemies.push({ x, y, hp: 6000, max: 6000, s: 2.5, spd: 2.5, type: "boss", dashCd: 0 });
        if(type === "zombie") enemies.push({ x, y, hp: 10000, max: 10000, s: 4, spd: 1.5, type: "zombie", jump: 0, vy: 0 });
    }
    spawn("normal");

    function drawBody(x, y, s, col, anim, casting, isZombie) {
        const walk = Math.sin(anim * 0.2) * 15 * s;
        ctx.strokeStyle = col; ctx.lineWidth = 5 * s; ctx.lineCap = "round";
        ctx.beginPath(); ctx.arc(x, y - 60*s, 15*s, 0, 7); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(x, y - 45*s); ctx.lineTo(x, y); ctx.stroke();
        if(casting === "stomach") { ctx.beginPath(); ctx.moveTo(x, y - 35*s); ctx.lineTo(x + 10*s*p.facing, y - 25*s); ctx.stroke(); }
        else {
            ctx.beginPath(); ctx.moveTo(x, y - 35*s); ctx.lineTo(x - 20*s + walk, y - 10*s); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(x, y - 35*s); ctx.lineTo(x + 20*s - walk, y - 10*s); ctx.stroke();
        }
        ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x - 15*s - (isZombie?0:walk), y + 40*s); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x + 15*s + (isZombie?0:walk), y + 40*s); ctx.stroke();
    }

    // --- INPUT ---
    let joyId = null;
    window.addEventListener("touchstart", e => { if(e.touches[0].clientX < 250) joyId = e.touches[0].identifier; });
    window.addEventListener("touchmove", e => {
        for(let t of e.changedTouches) if(t.identifier === joyId) {
            let dx = t.clientX - 100, dy = t.clientY - (window.innerHeight - 100);
            let dist = Math.min(Math.hypot(dx, dy), 50);
            let ang = Math.atan2(dy, dx);
            if(!p.isCasting && !isCutscene) {
                p.vx = Math.cos(ang) * (dist/50) * 8; p.vy = Math.sin(ang) * (dist/50) * 8;
                if(p.vx !== 0) p.facing = p.vx > 0 ? 1 : -1;
            }
            document.getElementById("joy-stick").style.transform = `translate(${Math.cos(ang)*dist}px, ${Math.sin(ang)*dist}px)`;
        }
    });
    window.addEventListener("touchend", () => { joyId = null; p.vx = 0; p.vy = 0; document.getElementById("joy-stick").style.transform="none"; });

    document.getElementById("punch-btn").onclick = () => {
        if(p.isCasting || isCutscene) return;
        fx.push({x: p.x, y: p.y, r: 10, max: 100, c: "white"});
        enemies.forEach(en => { if(Math.hypot(p.x-en.x, p.y-en.y) < 130) en.hp -= 150; });
    };

    document.getElementById("skill-btn").onclick = () => {
        if(Date.now() < skillCd || p.isCasting || isCutscene) return;
        skillCd = Date.now() + styles[style].cd;
        
        if(style === "Earth") {
            mudWall = { x: p.x + 50*p.facing, y: p.y - 80, w: 30, h: 160, life: Date.now() + 5000 };
            triggerMsg("MUD WALL", styles.Earth.col);
        } else if(style === "Ice") {
            for(let i=0; i<6; i++) fx.push({x: p.x + (i*50)*p.facing, y: p.y, type: "ice_spike", life: Date.now()+3000});
        } else if(style === "Flame") {
            fx.push({x: p.x, y: p.y, r: 0, max: 400, c: "#ff5500", type: "blast"});
            enemies.forEach(en => { if(Math.hypot(p.x-en.x, p.y-en.y) < 400) en.hp -= 5000; });
        } else if(style === "Void") {
            isCutscene = true; document.getElementById("cutscene-overlay").style.opacity="1";
            triggerMsg("UNIVERSE COLLAPSE", "#aa00ff");
            setTimeout(() => { shake=80; enemies.forEach(en=>en.hp-=15000); document.getElementById("cutscene-overlay").style.opacity="0"; isCutscene=false; }, 2000);
        } else if(style === "Gambler") {
            let r = Math.random();
            if(r < 0.1) { triggerMsg("JACKPOT!", "gold"); enemies.forEach(en=>en.hp-=30000); shake=50; }
            else if(r < 0.3) { triggerMsg("FAIL", "gray"); }
            else { triggerMsg("WIN", "#2ecc71"); enemies.forEach(en=>en.hp-=6000); }
        } else if(style === "Scientist") {
            p.isCasting = true; p.vx = 0; p.vy = 0; p.castAnim = "stomach";
            setTimeout(() => {
                p.castAnim = "vomit"; shake = 15;
                for(let i=0; i<25; i++) fx.push({x: p.x+10*p.facing, y: p.y-50, vx: (Math.random()*7+2)*p.facing, vy: Math.random()*8-6, life: Date.now()+600, c: "#2ecc71", type: "vomit"});
                for(let i=0; i<10; i++) curses.push({x: p.x, y: p.y-50, hp: 100, anim: Math.random()*10});
            }, 1000);
            setTimeout(() => { p.isCasting = false; p.castAnim = null; }, 1800);
        }
    };

    // --- SPIN LOGIC (Your exact percentages) ---
    document.getElementById("spin-btn").onclick = () => {
        if(coins >= 20) {
            coins -= 20; let roll = Math.random() * 100;
            if(roll <= 4) style = "Scientist";
            else if(roll <= 4 + 5) style = "Gambler"; // 5%
            else if(roll <= 4 + 5 + 10) style = "Void"; // 10%
            else if(roll <= 4 + 5 + 10 + 30) style = "Flame"; // 30%
            else if(roll <= 4 + 5 + 10 + 30 + 40) style = "Ice"; // 40%
            else style = "Earth"; // Default/50%
            triggerMsg("GOT: " + style, styles[style].col);
        }
    };

    document.getElementById("dungeon-btn").onclick = () => { scene = "dungeon"; enemies=[]; curses=[]; document.getElementById("dungeon-btn").style.display="none"; document.getElementById("exit-btn").style.display="block"; };
    document.getElementById("exit-btn").onclick = () => { scene = "battle"; wave=0; spawn("normal"); document.getElementById("exit-btn").style.display="none"; document.getElementById("dungeon-btn").style.display="block"; document.getElementById("shop-menu").style.display="none"; };

    function loop() {
        ctx.save();
        if(shake > 0) { ctx.translate(Math.random()*shake-shake/2, Math.random()*shake-shake/2); shake *= 0.9; }
        ctx.fillStyle = scene === "battle" ? "#0a0a0a" : "#0d1b0d";
        ctx.fillRect(-100,-100,canvas.width+200, canvas.height+200);
        
        document.getElementById("coin-lbl").innerText = "C: " + coins;
        document.getElementById("hp-fill").style.width = p.hp + "%";
        document.getElementById("style-txt").innerText = style;
        document.getElementById("style-txt").style.color = styles[style].col;

        let boss = enemies.find(e => e.type !== "normal");
        if(boss) { document.getElementById("boss-hud").style.display = "block"; document.getElementById("boss-name").innerText = boss.type.toUpperCase(); document.getElementById("boss-hp-fill").style.width = (boss.hp/boss.max*100) + "%"; }
        else { document.getElementById("boss-hud").style.display = "none"; }

        if(!p.isCasting && !isCutscene) { if(p.vx !== 0 || p.vy !== 0) p.anim++; p.x += p.vx; p.y += p.vy; }
        drawBody(p.x, p.y, 1, styles[style].col, p.anim, p.castAnim, false);

        if(mudWall && Date.now() < mudWall.life) { ctx.fillStyle = "#5d4037"; ctx.fillRect(mudWall.x, mudWall.y, mudWall.w, mudWall.h); }

        curses.forEach((cr, i) => {
            cr.anim++; let target = enemies[0];
            if(target) {
                let a = Math.atan2(target.y-cr.y, target.x-cr.x);
                cr.x += Math.cos(a)*6; cr.y += Math.sin(a)*6;
                if(Math.hypot(cr.x-target.x, cr.y-target.y) < 50) target.hp -= 2;
            }
            ctx.strokeStyle = "#aa00ff"; ctx.beginPath(); ctx.arc(cr.x, cr.y - Math.sin(cr.anim*0.3)*10, 10, 0, 7); ctx.stroke();
            if(target && target.hp <= 0) curses.splice(i, 1);
        });

        if(scene === "battle") {
            enemies.forEach((en, i) => {
                let d = Math.hypot(p.x-en.x, p.y-en.y);
                let blocked = mudWall && Date.now() < mudWall.life && en.x > mudWall.x && en.x < mudWall.x + mudWall.w;
                if(!isCutscene && !blocked) {
                    let a = Math.atan2(p.y-en.y, p.x-en.x);
                    en.x += Math.cos(a)*en.spd; en.y += Math.sin(a)*en.spd;
                }
                drawBody(en.x, en.y, en.s, en.type==="zombie"?"#2ecc71":(en.type==="boss"?"#f00":"#fff"), p.anim, null, en.type==="zombie");
                if(d < 60 && Date.now()%500 < 50) p.hp -= 5;
                if(en.hp <= 0) { coins += (en.type==="normal"?30:250); enemies.splice(i,1); if(enemies.length===0){wave++; spawn(wave%2===0?"zombie":"boss"); spawn("normal");}}
            });
        } else {
            ctx.strokeStyle = "#f1c40f"; ctx.lineWidth = 10; ctx.beginPath(); ctx.arc(canvas.width/2, canvas.height/2, 80, 0, 7); ctx.stroke();
            if(Math.hypot(p.x - canvas.width/2, p.y - canvas.height/2) < 90) document.getElementById("shop-menu").style.display = "block";
        }

        fx.forEach((f, i) => {
            if(f.type === "ice_spike") {
                ctx.fillStyle = "#00f2ff"; ctx.beginPath(); ctx.moveTo(f.x, f.y); ctx.lineTo(f.x-15, f.y-60); ctx.lineTo(f.x+15, f.y-60); ctx.fill();
                enemies.forEach(en => { if(Math.hypot(f.x-en.x, f.y-en.y) < 40) en.hp -= 5; });
                if(Date.now() > f.life) fx.splice(i,1);
            } else if(f.type === "vomit") {
                f.x += f.vx; f.y += f.vy; f.vy += 0.5; ctx.fillStyle = f.c; ctx.beginPath(); ctx.arc(f.x,f.y,5,0,7); ctx.fill();
                if(Date.now() > f.life) fx.splice(i,1);
            } else {
                ctx.strokeStyle = f.c; ctx.lineWidth = 5; ctx.beginPath(); ctx.arc(f.x, f.y, f.r, 0, 7); ctx.stroke();
                f.r += 12; if(f.r > f.max) fx.splice(i,1);
            }
        });

        ctx.restore();
        if(p.hp <= 0) location.reload();
        requestAnimationFrame(loop);
    }
    loop();
</script>
</body>
</html>
